steps:
  # 1. Build da imagem Docker
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/facial-auth/api:$COMMIT_SHA"
      - -t
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/facial-auth/api:latest"
      - .

  # 2. Push para Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/facial-auth/api"

  # 3. Deploy no Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - facial-auth-service
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/facial-auth/api:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated    # Acesso apenas via API Key + VPC
      - --min-instances=1             # Evita cold start
      - --max-instances=10
      - --memory=2Gi
      - --cpu=2
      - --timeout=30s
      - --set-env-vars=ENV=production
      - --set-secrets=DATABASE_URL=facial-auth-db-url:latest,API_KEYS=facial-auth-api-keys:latest,AWS_ACCESS_KEY_ID=facial-auth-aws-key:latest,AWS_SECRET_ACCESS_KEY=facial-auth-aws-secret:latest

substitutions:
  _REGION: us-central1

images:
  - "$_REGION-docker.pkg.dev/$PROJECT_ID/facial-auth/api:$COMMIT_SHA"
  - "$_REGION-docker.pkg.dev/$PROJECT_ID/facial-auth/api:latest"
